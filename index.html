<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Tracker Premium Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth fading animation for the modal popup */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fade-in {
            animation: fadeIn 0.2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans antialiased text-slate-900">

    <div id="login-page" class="flex flex-col items-center justify-center min-h-screen px-4 bg-slate-100">
        <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-200/60">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-indigo-600 text-white font-extrabold text-2xl shadow-md shadow-indigo-200 mb-4">
                    iT
                </div>
                <h1 class="text-2xl font-bold tracking-tight text-slate-800">Welcome to IssueTracker</h1>
                <p class="text-slate-500 text-sm mt-1.5">Sign in to manage active server code diagnostics</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1.5">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none transition" required placeholder="e.g., admin">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-600 mb-1.5">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2.5 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 focus:outline-none transition" required placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-xl transition shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/30">
                    Sign In
                </button>
            </form>

            <div class="mt-6 p-4 bg-slate-50 rounded-xl border border-dashed border-slate-300/80 text-xs text-slate-600">
                <p class="font-bold text-slate-700 mb-1.5 flex items-center gap-1">
                    💡 <span>Demo Credentials:</span>
                </p>
                <div class="space-y-1 font-mono">
                    <p>Username: <span class="bg-white px-1.5 py-0.5 border border-slate-200 rounded font-bold text-indigo-600">admin</span></p>
                    <p>Password: <span class="bg-white px-1.5 py-0.5 border border-slate-200 rounded font-bold text-indigo-600">admin123</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <nav class="bg-white border-b border-slate-200/80 sticky top-0 z-40 px-6 py-3.5 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-sm backdrop-blur-md bg-white/95">
            <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 rounded-lg bg-indigo-600 text-white font-black flex items-center justify-center shadow-sm shadow-indigo-200">
                    iT
                </div>
                <span class="font-bold text-xl tracking-tight text-slate-800">IssueTracker<span class="text-indigo-600">Pro</span></span>
            </div>
            
            <div class="flex w-full sm:w-auto max-w-md gap-2">
                <input type="text" id="search-input" placeholder="Search issues across backend repositories..." class="w-full sm:w-80 px-4 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 bg-slate-50/50 transition">
                <button id="search-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-5 py-2 rounded-xl transition shrink-0 shadow-md shadow-indigo-600/10">
                    Search
                </button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
            
            <div class="bg-white border border-slate-200 rounded-2xl p-5 mb-8 shadow-sm">
                <div class="flex border-b border-slate-200 mb-5 gap-1">
                    <button id="tab-all" class="pb-3 px-5 text-sm font-semibold border-b-2 border-indigo-600 text-indigo-600 transition-all">
                        All Issues
                    </button>
                    <button id="tab-open" class="pb-3 px-5 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-all">
                        Open
                    </button>
                    <button id="tab-closed" class="pb-3 px-5 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-800 transition-all">
                        Closed
                    </button>
                </div>
                
                <div class="flex flex-wrap items-center justify-between gap-3 text-xs sm:text-sm text-slate-600">
                    <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-lg border border-slate-100">
                        <span class="text-base leading-none">📌</span>
                        <span>Displaying <strong id="issue-count" class="text-slate-900 font-bold">0</strong> structural tickets</span>
                    </div>
                    <div class="flex gap-4 font-semibold text-xs uppercase tracking-wider">
                        <span class="flex items-center gap-1.5 text-emerald-600">
                            <span class="w-2.5 h-2.5 rounded-full bg-emerald-500 block"></span> Green: Open
                        </span>
                        <span class="flex items-center gap-1.5 text-purple-600">
                            <span class="w-2.5 h-2.5 rounded-full bg-purple-500 block"></span> Purple: Closed
                        </span>
                    </div>
                </div>
            </div>

            <div id="loader" class="hidden flex flex-col items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent shadow-sm"></div>
                <p class="text-slate-500 text-sm font-medium mt-4 tracking-wide">Syncing server database entries...</p>
            </div>

            <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">
                </div>
        </main>
    </div>

    <div id="detail-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden transform transition-all border border-slate-100 animate-fade-in">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-start">
                <h3 id="modal-title" class="text-lg font-bold text-slate-900 pr-4 leading-snug">Issue Title Content</h3>
                <button id="close-modal" class="text-slate-400 hover:text-slate-600 text-2xl font-medium transition leading-none">&times;</button>
            </div>
            
            <div class="p-6 space-y-4 text-sm text-slate-700">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Detailed Description</label>
                    <p id="modal-desc" class="text-slate-600 leading-relaxed bg-slate-50 p-3.5 rounded-xl border border-slate-100 whitespace-pre-line"></p>
                </div>
                
                <div class="grid grid-cols-2 gap-x-6 gap-y-4 pt-3 border-t border-slate-100">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-0.5">Author / Assignee</label>
                        <span id="modal-author" class="text-slate-800 font-semibold text-base"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-0.5">System Label Tag</label>
                        <div class="mt-0.5"><span id="modal-label" class="bg-slate-100 text-slate-700 font-medium px-2.5 py-1 rounded-md text-xs border border-slate-200"></span></div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-0.5">Severity Priority</label>
                        <span id="modal-priority" class="text-slate-800 font-medium block"></span>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-0.5">Created At Timestamp</label>
                        <span id="modal-date" class="text-slate-600 font-medium block"></span>
                    </div>
                </div>
            </div>
            
            <div class="bg-slate-50 px-6 py-4 flex justify-end border-t border-slate-100">
                <button id="modal-close-btn" class="bg-white hover:bg-slate-100 text-slate-700 border border-slate-300 font-semibold px-5 py-2 rounded-xl transition text-xs shadow-sm">
                    Close Window
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
